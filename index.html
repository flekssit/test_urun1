<head>
  <style>
/* Sayfa kenarlarındaki varsayılan boşlukları kaldırır */
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* Sayfanın sağında kaydırma çubuğu çıkmasını engeller */
  }

  /* Model görüntüleyiciyi tüm ekranı kaplayacak şekilde ayarlar */
  model-viewer {
    width: 100%;
    height: 100vh; /* 'vh' birimi ekran yüksekliğinin %100'ü demektir */
    display: block;
  }
  </style>
</head>

<body>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <model-viewer 
    src="liberta360_4.glb" 
    camera-controls 
    auto-rotate 
    shadow-intensity="1" 
    environment-image="neutral" 
    exposure="1.2">
  </model-viewer>
</body>
